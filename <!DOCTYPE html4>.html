<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <div class="gallery">
        <img src="https://picsum.photos/id/1015/600/400" alt="">
        <img src="https://picsum.photos/id/1016/600/400" alt="">
        <img src="https://picsum.photos/id/1025/600/400" alt="">
        <img src="https://picsum.photos/id/1035/600/400" alt="">
        <img src="https://picsum.photos/id/1043/600/400" alt="">
        <img src="https://picsum.photos/id/1050/600/400" alt="">
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-img" src="">
        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
